<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Mother's Day</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a0e08;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Cormorant Garamond", serif;
        overflow-x: hidden;
        padding: 20px 0;
      }
      .bg {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 20% 30%,
            rgba(180, 80, 30, 0.18) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 80% 70%,
            rgba(120, 40, 10, 0.15) 0%,
            transparent 60%
          );
      }
      /* Falling petals */
      .petals {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }
      .petal {
        position: absolute;
        border-radius: 50% 0 50% 0;
        opacity: 0;
        animation: fall linear infinite;
      }
      @keyframes fall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.7;
        }
        90% {
          opacity: 0.4;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }
      /* Card animation */
      .card {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        animation: cardIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      /* Gold frame */
      .frame-outer {
        padding: 16px;
        background: linear-gradient(
          135deg,
          #c9a96e 0%,
          #8b5e2a 30%,
          #c9a96e 50%,
          #6b3f10 70%,
          #c9a96e 100%
        );
        border-radius: 4px;
        box-shadow:
          0 0 0 2px #8b5e2a,
          0 0 60px rgba(180, 100, 20, 0.4),
          0 20px 60px rgba(0, 0, 0, 0.7);
      }
      .frame-inner {
        padding: 10px;
        background: linear-gradient(
          135deg,
          #6b3f10 0%,
          #c9a96e 25%,
          #8b5e2a 50%,
          #c9a96e 75%,
          #6b3f10 100%
        );
        border-radius: 2px;
      }
      /* Portrait with oil-paint look via CSS filters + SVG filter */
      .portrait-wrap {
        position: relative;
        width: 300px;
        line-height: 0;
        overflow: hidden;
        border-radius: 1px;
      }
      .portrait-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 50% 50%,
          transparent 40%,
          rgba(10, 3, 0, 0.55) 100%
        );
        pointer-events: none;
        z-index: 2;
      }
      .portrait-img {
        display: block;
        width: 300px;
        height: 400px;
        object-fit: cover;
        object-position: center top;
        filter: url(#oilPaint) saturate(1.6) contrast(1.12) brightness(1.05)
          sepia(0.18);
      }
      /* Corner ornaments */
      .corner {
        position: absolute;
        width: 32px;
        height: 32px;
        border-color: #c9a96e;
        border-style: solid;
        opacity: 0.9;
        z-index: 3;
      }
      .tl {
        top: -6px;
        left: -6px;
        border-width: 3px 0 0 3px;
      }
      .tr {
        top: -6px;
        right: -6px;
        border-width: 3px 3px 0 0;
      }
      .bl {
        bottom: -6px;
        left: -6px;
        border-width: 0 0 3px 3px;
      }
      .br {
        bottom: -6px;
        right: -6px;
        border-width: 0 3px 3px 0;
      }
      /* Message */
      .message {
        margin-top: 26px;
        text-align: center;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
        justify-content: center;
      }
      .dl {
        height: 1px;
        width: 60px;
        background: linear-gradient(
          to right,
          transparent,
          #c9a96e,
          transparent
        );
      }
      .dd {
        width: 6px;
        height: 6px;
        background: #c9a96e;
        transform: rotate(45deg);
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 34px;
        color: #fff8ee;
        line-height: 1.1;
        text-shadow: 0 2px 20px rgba(180, 100, 20, 0.5);
        animation: glow 3s ease-in-out infinite alternate;
      }
      @keyframes glow {
        from {
          text-shadow: 0 2px 20px rgba(180, 100, 20, 0.4);
        }
        to {
          text-shadow:
            0 2px 40px rgba(220, 150, 40, 0.8),
            0 0 80px rgba(180, 80, 10, 0.3);
        }
      }
      .sub {
        font-style: italic;
        font-weight: 300;
        font-size: 15px;
        color: #c9a96e;
        margin-top: 8px;
        letter-spacing: 0.1em;
        opacity: 0.85;
      }
      .hearts {
        margin-top: 12px;
        font-size: 18px;
        animation: hb 1.4s ease-in-out infinite;
        letter-spacing: 8px;
      }
      @keyframes hb {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
      }
      .badge {
        position: absolute;
        top: -14px;
        right: -14px;
        width: 52px;
        height: 52px;
        background: radial-gradient(circle, #d4a843 0%, #8b5e2a 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        box-shadow: 0 4px 20px rgba(180, 100, 20, 0.6);
        border: 2px solid #c9a96e;
        animation: spin 12s linear infinite;
        z-index: 4;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .label {
        letter-spacing: 0.25em;
        color: #c9a96e;
        font-size: 10px;
        font-weight: 300;
        text-transform: uppercase;
        opacity: 0.8;
        margin-bottom: 16px;
      }
      /* SVG filter hidden */
      svg.filters {
        position: absolute;
        width: 0;
        height: 0;
      }
    </style>
  </head>
  <body>
    <!-- SVG Oil-paint filter -->
    <svg class="filters" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="oilPaint" color-interpolation-filters="sRGB">
          <!-- Mild blur to blend colours like paint -->
          <feGaussianBlur stdDeviation="0.8" result="blur" />
          <!-- Sharpen edges back -->
          <feComposite
            in="SourceGraphic"
            in2="blur"
            operator="arithmetic"
            k1="0"
            k2="1.4"
            k3="-0.4"
            k4="0"
            result="sharp"
          />
          <!-- Add subtle paint texture via turbulence displacement -->
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.65"
            numOctaves="3"
            seed="5"
            result="noise"
          />
          <feDisplacementMap
            in="sharp"
            in2="noise"
            scale="2.5"
            xChannelSelector="R"
            yChannelSelector="G"
            result="displaced"
          />
          <feBlend in="displaced" in2="sharp" mode="normal" result="blended" />
        </filter>
      </defs>
    </svg>

    <div class="petals" id="petals"></div>
